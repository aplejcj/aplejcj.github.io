<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <style>
        
        :root { 
            --main-bg: #e6ffe6; 
            --main-color: #4CAF50; 
            --button-color: #81C784; 
            --text-color: #4CAF50; 
        }
        
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        
        body { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: var(--main-bg); 
            font-family: 'Sacramento', cursive, sans-serif;
            color: var(--main-color);
        }

        
        .container { 
            text-align: center; 
            padding: 2rem; 
            border-radius: 8px; 
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2); 
        }

        h1 { 
            font-size: 2rem; 
            margin-bottom: 1.5rem;
        }

        
        .button {
            font-size: 1.25rem; 
            color: white; 
            background-color: var(--button-color);
            padding: 0.5rem 1rem; 
            text-decoration: none; 
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .button:hover { 
            background-color: var(--main-color); 
        }
    </style>
</head>
<body>
    <link href="https://fonts.font.im/css?family=Sacramento" rel="stylesheet">
    <div class="container">
        <h1>Countdown to Surprise!</h1>
        <a href="./rose.html" class="button">Click me!</a>
    </div>
</body>
</html>
